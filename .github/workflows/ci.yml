name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: this workflow only reads the repo. No job needs write scopes.
permissions:
  contents: read

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Shellcheck all bash
        run: |
          shellcheck --severity=warning install.sh
          shellcheck --severity=warning scripts/install.sh
          shellcheck --severity=warning scripts/lib/*.sh
          shellcheck --severity=warning scripts/components/*/*.sh
          shellcheck --severity=warning tests/integration/*.sh
          shellcheck --severity=warning tools/*.sh

  unit-tests:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Run bats
        run: ./tests/unit/run.sh

  manifest-schema:
    name: Component manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install jq
        run: sudo apt-get install -y -qq jq
      - name: Validate every component manifest is parseable JSON (after stripping comments)
        run: |
          set -e
          for m in scripts/components/*/manifest.jsonc; do
            echo "checking ${m}"
            sed 's://.*$::g' "${m}" | jq -e .name >/dev/null
            sed 's://.*$::g' "${m}" | jq -e .presets >/dev/null
          done

  integration-component:
    name: Integration (per-component)
    needs: [shellcheck, unit-tests, manifest-schema]
    # Never run untrusted fork-PR code on the self-hosted Proxmox runner: that
    # runner can create/destroy LXCs and its account has broad sudo on the host.
    # Only same-repo PRs (and pushes to main) reach it; fork PRs run just the
    # sandboxed ubuntu-latest jobs above.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, soc-stack]
    concurrency:
      group: soc-stack-integration
      cancel-in-progress: false
    # PR matrix covers the 3 fast components (~5-10min each on the test host).
    # The 3 Docker-Compose-heavy components (thehive-cortex, misp, dashboards)
    # are exercised by integration-full on merge to main, since each takes
    # 15-30min on a constrained host and would stretch PR cycles past an hour.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        component:
          - wazuh
          - zeek-suricata
          - mcp
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Deploy + assert ${{ matrix.component }}
        run: bash tests/integration/ci-helpers/boot-test-env.sh "${{ matrix.component }}"
      - name: Tear down
        if: always()
        run: bash tests/integration/ci-helpers/teardown-test-env.sh "${{ matrix.component }}"

  integration-full:
    name: Integration (full stack)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: integration-component
    runs-on: [self-hosted, soc-stack]
    concurrency:
      group: soc-stack-integration
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Deploy full stack + 5 cross-component integrations
        run: bash tests/integration/ci-helpers/boot-test-env.sh all
      - name: Tear down
        if: always()
        run: bash tests/integration/ci-helpers/teardown-test-env.sh --all
