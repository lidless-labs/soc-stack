name: CI

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Integration component to run on the soc-stack self-hosted runner'
        required: true
        type: choice
        options:
          - wazuh
          - zeek-suricata
          - mcp
          - all
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Shellcheck all bash
        run: |
          shellcheck --severity=warning install.sh
          shellcheck --severity=warning scripts/install.sh
          shellcheck --severity=warning scripts/lib/*.sh
          shellcheck --severity=warning scripts/components/*/*.sh
          shellcheck --severity=warning tests/integration/*.sh
          shellcheck --severity=warning tools/*.sh

  unit-tests:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Run bats
        run: ./tests/unit/run.sh

  manifest-schema:
    name: Component manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y -qq jq
      - name: Validate every component manifest is parseable JSON (after stripping comments)
        run: |
          set -e
          for m in scripts/components/*/manifest.jsonc; do
            echo "checking ${m}"
            sed 's://.*$::g' "${m}" | jq -e .name >/dev/null
            sed 's://.*$::g' "${m}" | jq -e .presets >/dev/null
          done

  integration-component:
    name: Integration (per-component)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.component != 'all'
    needs: [shellcheck, unit-tests, manifest-schema]
    runs-on: [self-hosted, soc-stack]
    concurrency:
      group: soc-stack-integration
      cancel-in-progress: false
    # Host integrations require a dedicated self-hosted test runner, so normal
    # push and PR CI stays on hosted runners and these checks run on demand.
    steps:
      - uses: actions/checkout@v4
      - name: Deploy + assert ${{ github.event.inputs.component }}
        run: bash tests/integration/ci-helpers/boot-test-env.sh "${{ github.event.inputs.component }}"
      - name: Tear down
        if: always()
        run: bash tests/integration/ci-helpers/teardown-test-env.sh "${{ github.event.inputs.component }}"

  integration-full:
    name: Integration (full stack)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.component == 'all'
    needs: [shellcheck, unit-tests, manifest-schema]
    runs-on: [self-hosted, soc-stack]
    concurrency:
      group: soc-stack-integration
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Deploy full stack + 5 cross-component integrations
        run: bash tests/integration/ci-helpers/boot-test-env.sh all
      - name: Tear down
        if: always()
        run: bash tests/integration/ci-helpers/teardown-test-env.sh --all
